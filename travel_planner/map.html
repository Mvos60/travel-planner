<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Travel Planner Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #dedede;
        }

        .map-error {
            box-sizing: border-box;
            padding: 30px;
            font-family: sans-serif;
            color: #333333;
        }
    </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
if (typeof L === "undefined") {
    document.body.innerHTML = `
        <div class="map-error">
            <h2>OpenStreetMap kon niet worden geladen</h2>
            <p>Controleer de internetverbinding.</p>
        </div>
    `;
} else {
    const map = L.map("map").setView(
        [46.5, 13.5],
        5
    );

    L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">' +
                'OpenStreetMap contributors</a>'
        }
    ).addTo(map);

    let markers = [];
    let route = null;

    window.setStops = function(stops) {
        for (const marker of markers) {
            marker.remove();
        }

        markers = [];

        if (route) {
            route.remove();
            route = null;
        }

        const routeCoordinates = [];

        for (const stop of stops) {
            const coordinate = [
                stop.latitude,
                stop.longitude
            ];

            routeCoordinates.push(coordinate);

            const marker = L.marker(coordinate).addTo(map);

            marker.bindPopup(
                `<strong>${stop.name}</strong><br>` +
                `${stop.nights} nacht(en)`
            );

            markers.push(marker);
        }

        if (routeCoordinates.length === 1) {
            map.setView(routeCoordinates[0], 9);
            markers[0].openPopup();
        }

        if (routeCoordinates.length > 1) {
            route = L.polyline(
                routeCoordinates,
                {
                    weight: 4,
                    opacity: 0.8
                }
            ).addTo(map);

            map.fitBounds(
                route.getBounds(),
                {
                    padding: [30, 30]
                }
            );
        }
    };
}
</script>
</body>
</html>
