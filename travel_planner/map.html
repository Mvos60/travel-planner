<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Travel Planner Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #dedede;
        }

        .map-error {
            box-sizing: border-box;
            padding: 30px;
            font-family: sans-serif;
            color: #333333;
        }
    </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const stops = [
    {
        id: 1,
        name: "Vertrek Nederland",
        lat: 52.0907,
        lon: 5.1214,
        nights: 0
    },
    {
        id: 2,
        name: "Eifel / Hunsrück",
        lat: 50.0910,
        lon: 6.8110,
        nights: 1
    },
    {
        id: 3,
        name: "Obere Donau",
        lat: 48.0500,
        lon: 8.9700,
        nights: 3
    },
    {
        id: 4,
        name: "Allgäu",
        lat: 47.6900,
        lon: 10.0400,
        nights: 1
    },
    {
        id: 5,
        name: "Nockberge",
        lat: 46.8600,
        lon: 13.8400,
        nights: 3
    },
    {
        id: 6,
        name: "Gailtal / Weissensee",
        lat: 46.6700,
        lon: 13.0000,
        nights: 2
    },
    {
        id: 7,
        name: "Lesachtal",
        lat: 46.7000,
        lon: 12.7400,
        nights: 4
    },
    {
        id: 8,
        name: "Rateče / Planica",
        lat: 46.5000,
        lon: 13.7100,
        nights: 3
    },
    {
        id: 9,
        name: "Trenta / Soča",
        lat: 46.3800,
        lon: 13.7500,
        nights: 5
    },
    {
        id: 10,
        name: "Breginjski Kot",
        lat: 46.2600,
        lon: 13.4300,
        nights: 3
    },
    {
        id: 11,
        name: "Bohinj",
        lat: 46.2823,
        lon: 13.8582,
        nights: 3
    }
];

if (typeof L === "undefined") {
    document.body.innerHTML = `
        <div class="map-error">
            <h2>OpenStreetMap kon niet worden geladen</h2>
            <p>
                Controleer de internetverbinding. De Travel Planner zelf
                is gestart, maar de kaartbibliotheek is niet bereikbaar.
            </p>
        </div>
    `;
} else {
    const map = L.map("map", {
        zoomControl: true
    });

    L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">' +
                'OpenStreetMap contributors</a>'
        }
    ).addTo(map);

    const markers = {};
    const routeCoordinates = [];

    for (const stop of stops) {
        const coordinate = [stop.lat, stop.lon];
        routeCoordinates.push(coordinate);

        const marker = L.marker(coordinate).addTo(map);

        marker.bindPopup(
            `<strong>${stop.id}. ${stop.name}</strong><br>` +
            `${stop.nights} nacht(en)`
        );

        markers[stop.id] = marker;
    }

    const route = L.polyline(
        routeCoordinates,
        {
            weight: 4,
            opacity: 0.8
        }
    ).addTo(map);

    map.fitBounds(route.getBounds(), {
        padding: [30, 30]
    });

    window.focusStop = function(stopId) {
        const marker = markers[stopId];

        if (!marker) {
            return;
        }

        map.setView(marker.getLatLng(), 10);
        marker.openPopup();
    };

    window.showCompleteRoute = function() {
        map.fitBounds(route.getBounds(), {
            padding: [30, 30]
        });
    };
}
</script>
</body>
</html>
